<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KainToGo — Admin Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="kaintogo-shared.js"></script>
<style id="sharedStyle">
:root{
  --g:#1B4D3E;--gl:#E5F5E8;--gm:#2d6b58;--gd:#133829;
  --w:#FFFFFF;--dark:#212529;--gray:#6c757d;--lgray:#f8f9fa;
  --bdr:#dee2e6;--amber:#e8a020;--amber-l:#fff8e6;--red:#dc3545;
  --r:8px;--rl:16px;
  --sh:0 2px 12px rgba(27,77,62,.10);--shl:0 8px 32px rgba(27,77,62,.15);
  --serif:'Cormorant Garamond',serif;--sans:'Montserrat',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--lgray);color:var(--dark)}
.hidden{display:none!important}
.btn{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.8px;padding:9px 22px;border-radius:var(--r);border:1.5px solid var(--g);cursor:pointer;transition:all .2s;text-transform:uppercase;display:inline-block}
.btn-p{background:var(--g);color:var(--w)}.btn-p:hover{background:var(--gd)}
.btn-o{background:transparent;color:var(--g)}.btn-o:hover{background:var(--gl)}
.btn-sm{padding:6px 14px;font-size:10px}
.btn-amber{background:var(--amber);color:var(--w);border-color:var(--amber)}
.btn-danger{border-color:var(--red);color:var(--red);background:transparent}.btn-danger:hover{background:#fff5f5}
.btn-w{background:white;color:var(--g);border-color:white}.btn-w:hover{background:var(--gl)}
.btn-ghost{border-color:rgba(255,255,255,.5);color:white;background:transparent}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--dark);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--sans);font-size:13px;color:var(--dark);transition:border-color .2s;background:var(--w)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--g)}
.fg textarea{resize:vertical;min-height:80px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--g);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.b-green{background:var(--gl);color:var(--g)}.b-amber{background:#fff3cd;color:#856404}
.b-blue{background:#cff4fc;color:#055160}.b-red{background:#f8d7da;color:#842029}
.b-gray{background:#e9ecef;color:#495057}
.card{background:var(--w);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden}
.scard{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh)}
.slbl{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:.8px;text-transform:uppercase;margin-bottom:.4rem}
.sval{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--g);line-height:1}
.schg{font-size:10px;color:#28a745;margin-top:5px;font-weight:600}
.icard{background:var(--g);border-radius:var(--rl);padding:1.25rem;color:white;box-shadow:var(--sh)}
.icard .ico2{font-size:26px;margin-bottom:.5rem}
.icard .ilbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:4px}
.icard .ival{font-family:var(--serif);font-size:30px;font-weight:600}
.icard .iunit{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.tcard{background:var(--w);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden;margin-bottom:1.5rem}
.thead2{padding:1rem 1.25rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.thead2 h3{font-family:var(--serif);font-size:17px}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray);padding:9px 14px;text-align:left;background:var(--lgray);border-bottom:1px solid var(--bdr)}
tbody tr{border-bottom:1px solid var(--bdr);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--gl)}
tbody td{padding:11px 14px;font-size:12px}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.moverlay.open{display:flex}
.modal{background:var(--w);border-radius:var(--rl);padding:2rem;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;position:relative}
.modal h3{font-family:var(--serif);font-size:22px;color:var(--g);margin-bottom:1.25rem}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem}
.close-x{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray)}
.tabs{display:flex;border-bottom:2px solid var(--bdr);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:10px 18px;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;text-transform:uppercase;white-space:nowrap}
.tab.act{color:var(--g);border-bottom-color:var(--g)}
.dash{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 64px)}
.dside{background:var(--w);border-right:1px solid var(--bdr);padding:1rem 0}
.ditem{display:flex;align-items:center;gap:10px;padding:10px 1.25rem;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.ditem:hover,.ditem.act{color:var(--g);background:var(--gl);border-left-color:var(--g)}
.ditem .ico{font-size:15px;width:20px;text-align:center}
.dcon{padding:1.5rem;background:var(--lgray);overflow-y:auto}
.dhead{margin-bottom:1.5rem}
.dhead h2{font-family:var(--serif);font-size:26px}
.dhead p{font-size:12px;color:var(--gray);margin-top:3px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
.igrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.chart-card{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh)}
.chart-card h3{font-family:var(--serif);font-size:16px;margin-bottom:1rem}
.chart-wrap{position:relative;height:200px}
.frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem}
.fsel{padding:7px 12px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--sans);font-size:11px;font-weight:600;color:var(--dark);background:var(--w);cursor:pointer}
.fsel:focus{outline:none;border-color:var(--g)}
.search-in{padding:8px 14px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--sans);font-size:12px;color:var(--dark);background:var(--w)}
.search-in:focus{outline:none;border-color:var(--g)}
.toast-con{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--dark);color:white;padding:11px 18px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:var(--shl);animation:tin .3s ease;max-width:320px}
.toast.s{background:var(--g)}.toast.e{background:var(--red)}
@keyframes tin{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
nav{background:var(--w);border-bottom:1px solid var(--bdr);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo img{height:36px;object-fit:contain}
.logo-text{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--g);letter-spacing:2px}
.ham{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:var(--dark)}
.err{background:#fff5f5;border:1px solid #f5c6c6;color:var(--red);border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:1rem}
@media(max-width:900px){.dash{grid-template-columns:1fr}.dside{display:none}.ham{display:block}}
@media(max-width:600px){.chart-row{grid-template-columns:1fr}.sgrid{grid-template-columns:1fr 1fr}.igrid{grid-template-columns:1fr 1fr}}
</style>
<style>
body{min-height:100vh}
.nav-r{display:flex;align-items:center;gap:8px}
.admin-notice{background:var(--amber-l);border:1px solid var(--amber);border-radius:var(--r);padding:.75rem 1.25rem;font-size:11px;color:#856404;margin-bottom:1.5rem;display:flex;align-items:center;gap:8px}
.audit-row{display:flex;align-items:center;gap:10px;padding:.875rem 1.25rem;border-bottom:1px solid var(--bdr);font-size:12px}
.audit-row:last-child{border-bottom:none}
.audit-time{font-size:10px;color:var(--gray);min-width:130px}
.audit-actor{font-weight:700;color:var(--g);min-width:100px}
.audit-action{flex:1}
.audit-level{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px}
.acc-row{display:flex;align-items:center;gap:12px;padding:.875rem 1.25rem;border-bottom:1px solid var(--bdr)}
.acc-row:last-child{border-bottom:none}
.acc-info{flex:1}
.acc-name{font-weight:600;font-size:13px}
.acc-meta{font-size:11px;color:var(--gray)}
.ticket-card{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh);margin-bottom:.875rem}
.ticket-card h4{font-family:var(--serif);font-size:16px;margin-bottom:.25rem}
.stat-chip{display:inline-flex;align-items:center;gap:5px;background:var(--gl);color:var(--g);border-radius:8px;padding:4px 12px;font-size:11px;font-weight:700}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="window.location.href='index.html'">
    <img src="V3_light_BG.png" alt="KainToGo" onerror="this.style.display='none'"/>
    <span class="logo-text">KAINTOGO</span>
  </div>
  <div class="nav-r">
    <span style="font-size:10px;font-weight:700;color:var(--red);letter-spacing:1px;text-transform:uppercase;background:#fff5f5;border:1px solid #f5c6c6;padding:4px 10px;border-radius:20px">ADMIN</span>
    <div class="avatar" id="navAv" style="background:var(--dark)">A</div>
    <button class="btn btn-o btn-sm" onclick="logout()">Out</button>
  </div>
</nav>

<div class="dash">
  <div class="dside">
    <div style="padding:.875rem 1.25rem;border-bottom:1px solid var(--bdr);margin-bottom:.75rem">
      <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--gray);text-transform:uppercase">Admin Platform</div>
    </div>
    <div class="ditem act" id="ai-overview" onclick="aTab('overview')"><span class="ico">📊</span>Global Overview</div>
    <div class="ditem" id="ai-accounts" onclick="aTab('accounts')"><span class="ico">👥</span>Account Management</div>
    <div class="ditem" id="ai-transactions" onclick="aTab('transactions')"><span class="ico">💳</span>Transaction Monitor</div>
    <div class="ditem" id="ai-partners" onclick="aTab('partners')"><span class="ico">🤝</span>Partner Onboarding</div>
    <div class="ditem" id="ai-support" onclick="aTab('support')"><span class="ico">🎧</span>Support & Disputes</div>
    <div class="ditem" id="ai-audit" onclick="aTab('audit')"><span class="ico">📋</span>Audit Log</div>
    <div class="ditem" id="ai-analytics" onclick="aTab('analytics')"><span class="ico">🌍</span>Network Analytics</div>
  </div>
  <div class="dcon" id="dcon"></div>
</div>

<div class="toast-con" id="toastCon"></div>

<script>

// ── AUTH GUARD ──
let cu = getCurrentUser();
if(!cu || cu.role !== 'admin'){window.location.href = 'login.html'; throw 'Not authorized';}
document.getElementById('navAv').textContent = cu.avatar;

const allOrders = kLoad('orders') || seedOrders();
const allPartners = kLoad('partners') || seedPartners();
let allAccounts = [...DEMO_ACCOUNTS, ...(kLoad('users')||[])];
let charts = {};

// ── SIMULATED AUDIT LOG ──
const auditLog = [
  {time:'2026-04-03 09:14',actor:'merchant@demo.com',role:'merchant',action:'Created Surprise Bag: "Green Bowl Surprise"',level:'info'},
  {time:'2026-04-03 09:02',actor:'customer@demo.com',role:'customer',action:'Reserved bag ORD-CC3D4 at Spice Route',level:'info'},
  {time:'2026-04-03 08:55',actor:'hq@demo.com',role:'hq',action:'Sent partnership request to Caritas Manila',level:'info'},
  {time:'2026-04-03 08:43',actor:'merchant@demo.com',role:'merchant',action:'Logged 3.5 kg edible waste — assigned to Feeding the Future PH',level:'info'},
  {time:'2026-04-03 08:31',actor:'customer@demo.com',role:'customer',action:'Completed pickup for ORD-AA1B2 at Green Bowl',level:'success'},
  {time:'2026-04-02 19:05',actor:'hq@demo.com',role:'hq',action:'Downloaded ESG report — March 2026',level:'info'},
  {time:'2026-04-02 17:58',actor:'partner@demo.com',role:'partner',action:'Claimed surplus: Bakery items 2.0 kg at La Petite Boulangerie',level:'info'},
  {time:'2026-04-02 16:34',actor:'System',role:'system',action:'Payment settled for 12 completed orders',level:'success'},
  {time:'2026-04-02 14:21',actor:'admin@demo.com',role:'admin',action:'Verified partner: Feeding the Future PH (ID: p1)',level:'info'},
  {time:'2026-04-01 11:05',actor:'customer@demo.com',role:'customer',action:'Account created — KTG-10001',level:'info'},
  {time:'2026-04-01 09:00',actor:'System',role:'system',action:'Daily bag listings refreshed for 5 shops',level:'success'},
  {time:'2026-03-31 20:12',actor:'merchant@demo.com',role:'merchant',action:'Generated waste management report — March 2026',level:'info'},
  {time:'2026-03-31 18:00',actor:'System',role:'system',action:'Recurring bag listings auto-published for next day',level:'info'},
  {time:'2026-03-30 14:55',actor:'hq@demo.com',role:'hq',action:'Signed contract with EcoRecycle PH',level:'success'},
];

// ── SIMULATED SUPPORT TICKETS ──
const tickets = [
  {id:'TKT-001',user:'customer@demo.com',role:'customer',subject:'I missed my pickup window — can I reschedule?',date:'2026-04-03',status:'open',priority:'normal'},
  {id:'TKT-002',user:'merchant@demo.com',role:'merchant',subject:'Payment not received for 3 completed orders',date:'2026-04-02',status:'open',priority:'high'},
  {id:'TKT-003',user:'partner@demo.com',role:'partner',subject:'Unable to mark pickup as completed',date:'2026-04-01',status:'resolved',priority:'normal'},
  {id:'TKT-004',user:'customer@demo.com',role:'customer',subject:'Order confirmed but bag was not available',date:'2026-04-01',status:'resolved',priority:'high'},
];

function aTab(t){
  document.querySelectorAll('[id^="ai-"]').forEach(e=>e.classList.remove('act'));
  document.getElementById('ai-'+t)?.classList.add('act');
  if(t==='overview') renderOverview();
  else if(t==='accounts') renderAccounts();
  else if(t==='transactions') renderTransactions();
  else if(t==='partners') renderPartners();
  else if(t==='support') renderSupport();
  else if(t==='audit') renderAudit();
  else if(t==='analytics') renderAnalytics();
}

function adminNotice(){
  return `<div class="admin-notice">⚠️ <strong>Admin read-only policy:</strong> Operational data cannot be modified without generating a traceable audit entry. Admin access is for monitoring, support, and onboarding only — not for intervening in live transactions.</div>`;
}

// ── GLOBAL OVERVIEW ──
function renderOverview(){
  const imp = calcImpact(allOrders);
  const totalUsers = allAccounts.filter(u=>u.role==='customer').length;
  const totalMerchants = allAccounts.filter(u=>u.role==='merchant').length;
  const activePartners = allPartners.filter(p=>p.status==='active').length;
  const openTickets = tickets.filter(t=>t.status==='open').length;
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>🌍 Global Overview</h2><p>Platform-wide aggregated metrics — read only.</p></div>
    ${adminNotice()}
    <div class="sgrid">
      <div class="scard"><div class="slbl">Total Users</div><div class="sval">${totalUsers}</div><div class="schg">customers</div></div>
      <div class="scard"><div class="slbl">Merchant Shops</div><div class="sval">${SHOPS.length}</div></div>
      <div class="scard"><div class="slbl">Active Partners</div><div class="sval">${activePartners}</div></div>
      <div class="scard"><div class="slbl">Open Tickets</div><div class="sval" style="color:${openTickets>0?'var(--amber)':'var(--g)'}">${openTickets}</div></div>
    </div>
    <div class="igrid">
      <div class="icard"><div class="ico2">📦</div><div class="ilbl">Total Orders</div><div class="ival">${allOrders.length}</div></div>
      <div class="icard"><div class="ico2">🥗</div><div class="ilbl">Food Rescued</div><div class="ival">${imp.kgSaved}</div><div class="iunit">kg</div></div>
      <div class="icard"><div class="ico2">🌫️</div><div class="ilbl">CO₂ Prevented</div><div class="ival">${imp.co2}</div><div class="iunit">kg</div></div>
      <div class="icard"><div class="ico2">💰</div><div class="ilbl">Platform Revenue</div><div class="ival">₱${imp.revenue.toLocaleString()}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
      <div class="scard"><div class="slbl">Completed Orders</div><div class="sval">${allOrders.filter(o=>o.status==='completed').length}</div></div>
      <div class="scard"><div class="slbl">Pending Pickups</div><div class="sval" style="color:var(--amber)">${allOrders.filter(o=>o.status==='confirmed').length}</div></div>
    </div>
    <div class="tcard">
      <div class="thead2"><h3>System Status</h3></div>
      <div style="padding:1.25rem;display:flex;flex-direction:column;gap:.75rem">
        ${[['🟢','Platform','Operational'],['🟢','Order System','Operational'],['🟢','Map Service (OSM)','Operational'],['🟢','Waste Reporting','Operational'],['🟢','Partner Portal','Operational'],['🟡','Payment Gateway','Test Mode / Backend Required'],['🟡','Push Notifications','Backend Required'],['🟡','Email System','Backend Required']].map(([s,n,l])=>`
          <div style="display:flex;align-items:center;gap:10px;font-size:12px">
            <span style="font-size:14px">${s}</span>
            <span style="font-weight:600;min-width:180px">${n}</span>
            <span style="color:var(--gray)">${l}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── ACCOUNTS ──
function renderAccounts(){
  const roles=['customer','merchant','hq','partner','admin'];
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>👥 Account Management</h2><p>View all registered accounts. Account suspension or role changes generate audit entries.</p></div>
    ${adminNotice()}
    <div class="frow" style="margin-bottom:1.25rem">
      <select class="fsel" id="roleFilter" onchange="filterAccounts()">
        <option value="">All Roles</option>
        ${roles.map(r=>`<option value="${r}">${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}
      </select>
      <input class="search-in" id="accSearch" placeholder="Search by name or email..." oninput="filterAccounts()" style="flex:1;max-width:280px"/>
    </div>
    <div class="tcard" id="accountsTable">
      ${renderAccountRows(allAccounts)}
    </div>`;
}

function filterAccounts(){
  const role = document.getElementById('roleFilter')?.value;
  const q = (document.getElementById('accSearch')?.value||'').toLowerCase();
  let list = allAccounts;
  if(role) list = list.filter(u=>u.role===role);
  if(q) list = list.filter(u=>(u.name||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q));
  document.getElementById('accountsTable').innerHTML = renderAccountRows(list);
}

function renderAccountRows(list){
  if(!list.length) return '<div style="text-align:center;padding:2rem;color:var(--gray)">No accounts found.</div>';
  return `<div>${list.map(u=>`
    <div class="acc-row">
      <div class="avatar" style="width:32px;height:32px;font-size:11px;flex-shrink:0">${u.avatar||u.name?.[0]||'?'}</div>
      <div class="acc-info">
        <div class="acc-name">${u.name}</div>
        <div class="acc-meta">${u.email} · KTG ID: ${u.ktgId||'—'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge ${{customer:'b-blue',merchant:'b-green',hq:'b-amber',partner:'b-gray',admin:'b-red'}[u.role]||'b-gray'}">${u.role}</span>
        <button class="btn btn-sm btn-o" onclick="toast('Audit: Viewed account details for ${u.name}. (Read only)')">View</button>
        <button class="btn btn-sm btn-danger" onclick="toast('Account suspension would generate audit entry & require confirmation.','e')">Suspend</button>
      </div>
    </div>`).join('')}
  </div>`;
}

// ── TRANSACTIONS ──
function renderTransactions(){
  const sorted = allOrders.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>💳 Transaction Monitor</h2><p>Read-only view of all platform transactions.</p></div>
    ${adminNotice()}
    <div class="frow" style="margin-bottom:1rem">
      <select class="fsel" id="txStatus" onchange="filterTx()">
        <option value="">All Statuses</option>
        <option value="completed">Completed</option>
        <option value="confirmed">Pending Pickup</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <input class="search-in" id="txSearch" placeholder="Search order ID, shop, customer..." oninput="filterTx()" style="flex:1;max-width:280px"/>
    </div>
    <div class="tcard" id="txTable">
      ${renderTxTable(sorted)}
    </div>
    <div style="background:var(--lgray);border-radius:var(--r);padding:.875rem;font-size:11px;color:var(--gray);margin-top:1rem">
      ⚠️ Admin cannot modify transactions. Any dispute requiring transaction correction must be logged via Support & Disputes and traced in the Audit Log.
    </div>`;
}

function filterTx(){
  const status = document.getElementById('txStatus')?.value;
  const q = (document.getElementById('txSearch')?.value||'').toLowerCase();
  let list = allOrders;
  if(status) list = list.filter(o=>o.status===status);
  if(q) list = list.filter(o=>o.id?.toLowerCase().includes(q)||o.shop?.toLowerCase().includes(q)||o.customerName?.toLowerCase().includes(q));
  document.getElementById('txTable').innerHTML = renderTxTable(list.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)));
}

function renderTxTable(data){
  return `<div style="overflow-x:auto"><table>
    <thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Shop</th><th>Bag</th><th>Amount</th><th>Status</th><th>Flag</th></tr></thead>
    <tbody>${data.length ? data.map(o=>`
      <tr>
        <td style="font-weight:700;font-size:11px;color:var(--g)">${o.id}</td>
        <td>${o.date}</td>
        <td>${o.customerName}</td>
        <td>${o.shop}</td>
        <td>${o.bagName||o.bagId||'—'}</td>
        <td style="font-weight:700">₱${o.price}</td>
        <td><span class="badge ${o.status==='completed'?'b-green':o.status==='confirmed'?'b-blue':'b-gray'}">${o.status}</span></td>
        <td><button class="btn btn-sm btn-o" onclick="flagTx('${o.id}')">🚩 Flag</button></td>
      </tr>`).join('')
    :'<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--gray)">No transactions found.</td></tr>'}
    </tbody>
  </table></div>`;
}

function flagTx(id){
  toast(`Transaction ${id} flagged for review. Audit entry created.`,'s');
  // In a real system, this would create an audit entry and alert the support team
}

// ── SUPPORT & DISPUTES ──
function renderSupport(){
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>🎧 Support & Disputes</h2><p>Manage open tickets and disputes from users, merchants, and partners.</p></div>
    <div class="frow" style="margin-bottom:1.25rem">
      <select class="fsel" id="ticketStatus" onchange="filterTickets()">
        <option value="">All</option>
        <option value="open">Open</option>
        <option value="resolved">Resolved</option>
      </select>
    </div>
    <div id="ticketList">
      ${renderTickets(tickets)}
    </div>`;
}

function filterTickets(){
  const s = document.getElementById('ticketStatus')?.value;
  document.getElementById('ticketList').innerHTML = renderTickets(s?tickets.filter(t=>t.status===s):tickets);
}

function renderTickets(list){
  return list.map(t=>`
    <div class="ticket-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:.5rem">
        <div>
          <div style="font-size:10px;font-weight:700;color:var(--gray);letter-spacing:.5px">${t.id} · ${t.date} · ${t.role.toUpperCase()}</div>
          <h4>${t.subject}</h4>
          <div style="font-size:11px;color:var(--gray)">${t.user}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="badge ${t.priority==='high'?'b-red':'b-gray'}">${t.priority}</span>
          <span class="badge ${t.status==='open'?'b-amber':'b-green'}">${t.status}</span>
        </div>
      </div>
      ${t.status==='open'?`
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:.75rem">
          <button class="btn btn-p btn-sm" onclick="resolveTicket('${t.id}')">✓ Mark Resolved</button>
          <button class="btn btn-o btn-sm" onclick="toast('Message sent to ${t.user}')">✉️ Contact User</button>
          <button class="btn btn-danger btn-sm" onclick="toast('Dispute escalated for ${t.id}. Audit entry created.','e')">⚠️ Escalate</button>
        </div>`:''}
    </div>`).join('');
}

function resolveTicket(id){
  const t = tickets.find(x=>x.id===id);
  if(t){t.status='resolved';toast('Ticket '+id+' resolved. Audit entry created.','s');renderSupport();}
}

function renderAudit(){
  const levelColors={info:'b-gray',success:'b-green',warn:'b-amber',error:'b-red'};
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>📋 Audit Log</h2><p>Immutable record of all platform actions. Read only.</p></div>
    <div class="frow" style="margin-bottom:.75rem">
      <select class="fsel" id="auditRole" onchange="filterAudit()">
        <option value="">All Actors</option>
        <option value="customer">Customer</option><option value="merchant">Merchant</option>
        <option value="hq">HQ</option><option value="partner">Partner</option>
        <option value="admin">Admin</option><option value="system">System</option>
      </select>
      <button class="btn btn-o btn-sm" onclick="toast('Audit export — connect to backend for CSV download')">⬇ Export</button>
    </div>
    <div class="tcard" id="auditList">
      ${auditLog.map(e=>`
        <div class="audit-row">
          <span class="audit-time">🕐 ${e.time}</span>
          <span class="audit-actor">${e.actor}</span>
          <span class="badge ${{info:'b-gray',success:'b-green',warn:'b-amber',error:'b-red'}[e.level]||'b-gray'} audit-level">${e.level}</span>
          <span class="audit-action">${e.action}</span>

function filterAudit(){
  const role = document.getElementById('auditRole')?.value;
  const list = role ? auditLog.filter(e=>e.role===role||e.actor.includes(role)) : auditLog;
  document.getElementById('auditList').innerHTML = list.map(e=>`
    <div class="audit-row">
      <span class="audit-time">🕐 ${e.time}</span>
      <span class="audit-actor">${e.actor}</span>
      <span class="badge ${{info:'b-gray',success:'b-green',warn:'b-amber',error:'b-red'}[e.level]||'b-gray'} audit-level">${e.level}</span>
      <span class="audit-action">${e.action}</span>
    </div>`).join('');
}

// ── NETWORK ANALYTICS ──
function renderAnalytics(){
  const imp = calcImpact(allOrders);
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>🌍 Network Analytics</h2><p>Platform-wide aggregated impact — anonymized where applicable.</p></div>
    ${adminNotice()}
    <div class="igrid">
      <div class="icard"><div class="ico2">📦</div><div class="ilbl">All-Time Orders</div><div class="ival">${allOrders.length}</div></div>
      <div class="icard"><div class="ico2">🥗</div><div class="ilbl">Food Rescued</div><div class="ival">${imp.kgSaved}</div><div class="iunit">kg</div></div>
      <div class="icard"><div class="ico2">🌫️</div><div class="ilbl">CO₂ Prevented</div><div class="ival">${imp.co2}</div><div class="iunit">kg</div></div>
      <div class="icard"><div class="ico2">💧</div><div class="ilbl">Water Saved</div><div class="ival">${imp.water}</div><div class="iunit">L</div></div>
    </div>
    <div class="chart-row">
      <div class="chart-card"><h3>Orders by Status</h3><div class="chart-wrap"><canvas id="aPie"></canvas></div></div>
      <div class="chart-card"><h3>Monthly Orders</h3><div class="chart-wrap"><canvas id="aBar"></canvas></div></div>
    </div>
    <div class="tcard">
      <div class="thead2"><h3>Shop Performance</h3></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Shop</th><th>Location</th><th>Orders</th><th>Food Rescued</th><th>Revenue</th></tr></thead>
        <tbody>${SHOPS.map(s=>{const si=calcImpact(allOrders.filter(o=>o.shopId===s.id));return`
          <tr><td><strong>${s.name}</strong></td><td>${s.location}</td>
          <td>${si.bagsSold}</td>
          <td style="color:var(--g);font-weight:700">${si.kgSaved} kg</td>
          <td style="font-weight:700">₱${si.revenue.toLocaleString()}</td></tr>`;}).join('')}
        </tbody>
      </table></div>
    </div>`;
  setTimeout(()=>{
    const completed=allOrders.filter(o=>o.status==='completed').length;
    const confirmed=allOrders.filter(o=>o.status==='confirmed').length;
    const other=allOrders.length-completed-confirmed;
    const ctx1=document.getElementById('aPie');
    if(ctx1&&!charts.aPie){charts.aPie=new Chart(ctx1,{type:'doughnut',data:{labels:['Completed','Pending Pickup','Other'],datasets:[{data:[completed,confirmed,other],backgroundColor:['#1B4D3E','#e8a020','#dee2e6'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Montserrat',size:10}}}}}});}
    const ctx2=document.getElementById('aBar');
    if(ctx2&&!charts.aBar){
      const months={};for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months[d.toLocaleString('default',{month:'short'})]=0;}
      allOrders.forEach(r=>{const k=new Date(r.date).toLocaleString('default',{month:'short'});if(months[k]!==undefined)months[k]++;});
      charts.aBar=new Chart(ctx2,{type:'bar',data:{labels:Object.keys(months),datasets:[{label:'Orders',data:Object.values(months),backgroundColor:'#1B4D3E',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
    }
  },50);
}

aTab('overview');
</script>
