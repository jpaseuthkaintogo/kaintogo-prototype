<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KainToGo — Brand HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="kaintogo-shared.js"></script>
<style id="sharedStyle">
:root{
  --g:#1B4D3E;--gl:#E5F5E8;--gm:#2d6b58;--gd:#133829;
  --w:#FFFFFF;--dark:#212529;--gray:#6c757d;--lgray:#f8f9fa;
  --bdr:#dee2e6;--amber:#e8a020;--amber-l:#fff8e6;--red:#dc3545;
  --r:8px;--rl:16px;
  --sh:0 2px 12px rgba(27,77,62,.10);--shl:0 8px 32px rgba(27,77,62,.15);
  --serif:'Cormorant Garamond',serif;--sans:'Montserrat',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--lgray);color:var(--dark)}
.hidden{display:none!important}
.btn{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.8px;padding:9px 22px;border-radius:var(--r);border:1.5px solid var(--g);cursor:pointer;transition:all .2s;text-transform:uppercase;display:inline-block}
.btn-p{background:var(--g);color:var(--w)}.btn-p:hover{background:var(--gd)}
.btn-o{background:transparent;color:var(--g)}.btn-o:hover{background:var(--gl)}
.btn-sm{padding:6px 14px;font-size:10px}
.btn-amber{background:var(--amber);color:var(--w);border-color:var(--amber)}
.btn-danger{border-color:var(--red);color:var(--red);background:transparent}.btn-danger:hover{background:#fff5f5}
.btn-w{background:white;color:var(--g);border-color:white}.btn-w:hover{background:var(--gl)}
.btn-ghost{border-color:rgba(255,255,255,.5);color:white;background:transparent}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--dark);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--sans);font-size:13px;color:var(--dark);transition:border-color .2s;background:var(--w)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--g)}
.fg textarea{resize:vertical;min-height:80px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--g);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.b-green{background:var(--gl);color:var(--g)}.b-amber{background:#fff3cd;color:#856404}
.b-blue{background:#cff4fc;color:#055160}.b-red{background:#f8d7da;color:#842029}
.b-gray{background:#e9ecef;color:#495057}
.card{background:var(--w);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden}
.scard{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh)}
.slbl{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:.8px;text-transform:uppercase;margin-bottom:.4rem}
.sval{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--g);line-height:1}
.schg{font-size:10px;color:#28a745;margin-top:5px;font-weight:600}
.icard{background:var(--g);border-radius:var(--rl);padding:1.25rem;color:white;box-shadow:var(--sh)}
.icard .ico2{font-size:26px;margin-bottom:.5rem}
.icard .ilbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:4px}
.icard .ival{font-family:var(--serif);font-size:30px;font-weight:600}
.icard .iunit{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.tcard{background:var(--w);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden;margin-bottom:1.5rem}
.thead2{padding:1rem 1.25rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.thead2 h3{font-family:var(--serif);font-size:17px}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray);padding:9px 14px;text-align:left;background:var(--lgray);border-bottom:1px solid var(--bdr)}
tbody tr{border-bottom:1px solid var(--bdr);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--gl)}
tbody td{padding:11px 14px;font-size:12px}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.moverlay.open{display:flex}
.modal{background:var(--w);border-radius:var(--rl);padding:2rem;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;position:relative}
.modal h3{font-family:var(--serif);font-size:22px;color:var(--g);margin-bottom:1.25rem}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem}
.close-x{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray)}
.tabs{display:flex;border-bottom:2px solid var(--bdr);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:10px 18px;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;text-transform:uppercase;white-space:nowrap}
.tab.act{color:var(--g);border-bottom-color:var(--g)}
.dash{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 64px)}
.dside{background:var(--w);border-right:1px solid var(--bdr);padding:1rem 0}
.ditem{display:flex;align-items:center;gap:10px;padding:10px 1.25rem;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.ditem:hover,.ditem.act{color:var(--g);background:var(--gl);border-left-color:var(--g)}
.ditem .ico{font-size:15px;width:20px;text-align:center}
.dcon{padding:1.5rem;background:var(--lgray);overflow-y:auto}
.dhead{margin-bottom:1.5rem}
.dhead h2{font-family:var(--serif);font-size:26px}
.dhead p{font-size:12px;color:var(--gray);margin-top:3px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
.igrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.chart-card{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh)}
.chart-card h3{font-family:var(--serif);font-size:16px;margin-bottom:1rem}
.chart-wrap{position:relative;height:200px}
.frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem}
.fsel{padding:7px 12px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--sans);font-size:11px;font-weight:600;color:var(--dark);background:var(--w);cursor:pointer}
.fsel:focus{outline:none;border-color:var(--g)}
.search-in{padding:8px 14px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--sans);font-size:12px;color:var(--dark);background:var(--w)}
.search-in:focus{outline:none;border-color:var(--g)}
.toast-con{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--dark);color:white;padding:11px 18px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:var(--shl);animation:tin .3s ease;max-width:320px}
.toast.s{background:var(--g)}.toast.e{background:var(--red)}
@keyframes tin{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
nav{background:var(--w);border-bottom:1px solid var(--bdr);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo img{height:36px;object-fit:contain}
.logo-text{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--g);letter-spacing:2px}
.ham{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:var(--dark)}
.err{background:#fff5f5;border:1px solid #f5c6c6;color:var(--red);border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:1rem}
@media(max-width:900px){.dash{grid-template-columns:1fr}.dside{display:none}.ham{display:block}}
@media(max-width:600px){.chart-row{grid-template-columns:1fr}.sgrid{grid-template-columns:1fr 1fr}.igrid{grid-template-columns:1fr 1fr}}
</style>
<style>
body{min-height:100vh}
.nav-r{display:flex;align-items:center;gap:8px}
.partner-card{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh);margin-bottom:1rem}
.partner-card h4{font-family:var(--serif);font-size:17px;margin-bottom:.25rem}
.contract-box{background:var(--lgray);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;font-size:11px;line-height:1.9;max-height:300px;overflow-y:auto;white-space:pre-wrap;font-family:Georgia,serif;color:var(--dark)}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="window.location.href='index.html'"><img src="V3_light_BG.png" alt="KainToGo" onerror="this.style.display='none'"/><span class="logo-text">KAINTOGO</span></div>
  <div class="nav-r">
    <span style="font-size:11px;font-weight:600;color:var(--g)">Brand HQ</span>
    <div class="avatar" id="navAv">J</div>
    <button class="btn btn-o btn-sm" onclick="logout()">Out</button>
  </div>
</nav>
<div class="dash">
  <div class="dside">
    <div style="padding:.875rem 1.25rem;border-bottom:1px solid var(--bdr);margin-bottom:.75rem"><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--gray);text-transform:uppercase">Brand HQ</div></div>
    <div class="ditem act" id="hi-overview" onclick="hTab('overview')"><span class="ico">🏢</span>Network Overview</div>
    <div class="ditem" id="hi-esg" onclick="hTab('esg')"><span class="ico">🌿</span>ESG Analytics</div>
    <div class="ditem" id="hi-shops" onclick="hTab('shops')"><span class="ico">🏪</span>All Shops</div>
    <div class="ditem" id="hi-orders" onclick="hTab('orders')"><span class="ico">📦</span>All Reservations</div>
    <div class="ditem" id="hi-partners" onclick="hTab('partners')"><span class="ico">🤝</span>Partners</div>
    <div class="ditem" id="hi-merchants" onclick="hTab('merchants')"><span class="ico">👥</span>Merchants</div>
  </div>
  <div class="dcon" id="dcon"></div>
</div>

<!-- PARTNER REQUEST MODAL -->
<div class="moverlay" id="partnerModal">
  <div class="modal" style="max-width:600px">
    <button class="close-x" onclick="closeMod('partnerModal')">✕</button>
    <h3>Add a Partner</h3>
    <div class="fg"><label>Organisation Name</label><input id="pname" placeholder="e.g. Caritas Manila"/></div>
    <div class="fg"><label>Type</label><select id="ptype"><option value="foodbank">Food Bank</option><option value="ngo">NGO</option><option value="recycler">Recycler</option><option value="compost">Compost Service</option></select></div>
    <div class="fg"><label>Contact Email</label><input type="email" id="pemail" placeholder="contact@partner.org"/></div>
    <div class="fg"><label>Service Area</label><input id="parea" placeholder="e.g. Metro Manila, NCR"/></div>
    <div class="fg"><label>Type of Waste Accepted</label><textarea id="pwaste" placeholder="e.g. Edible prepared meals, bakery items..."></textarea></div>
    <div class="fg"><label>Estimated Pickup Frequency</label><select id="pfreq"><option>Daily</option><option>Every other day</option><option>Weekly</option><option>On demand</option></select></div>
    <p style="font-size:11px;color:var(--gray);line-height:1.6;margin-bottom:.75rem">A partnership request will be sent to this organisation with your shop profiles, waste types, and estimated frequency.</p>
    <div class="mfoot">
      <button class="btn btn-o" onclick="closeMod('partnerModal')">Cancel</button>
      <button class="btn btn-p" onclick="sendPartnerRequest()">Send Request</button>
    </div>
  </div>
</div>

<!-- CONTRACT MODAL -->
<div class="moverlay" id="contractModal">
  <div class="modal" style="max-width:640px">
    <button class="close-x" onclick="closeMod('contractModal')">✕</button>
    <h3>Partnership Contract</h3>
    <div class="contract-box" id="contractText"></div>
    <div style="background:var(--gl);border-radius:var(--r);padding:.875rem;margin-top:1rem">
      <div style="font-size:11px;font-weight:700;color:var(--g);margin-bottom:.5rem">Electronic Agreement</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer">
        <input type="checkbox" id="esigCheck" onchange="document.getElementById('esigBtn').disabled=!this.checked"/>
        I have read and agree to the terms of this partnership contract on behalf of KainToGo.
      </label>
    </div>
    <div class="mfoot">
      <button class="btn btn-o" onclick="closeMod('contractModal')">Close</button>
      <button class="btn btn-o" onclick="downloadContract()">⬇ Download PDF</button>
      <button class="btn btn-p" id="esigBtn" disabled onclick="signContract()">✍️ Sign & Activate</button>
    </div>
  </div>
</div>

<div class="toast-con" id="toastCon"></div>
<script>
let cu = getCurrentUser();
if(!cu || cu.role !== 'hq'){window.location.href = 'login.html'; throw 'Not authorized';}
document.getElementById('navAv').textContent = cu.avatar;
let orders = kLoad('orders') || seedOrders();
let partners = kLoad('partners') || seedPartners();
let hPeriod = 'month';
let hShopFilter = 'All';
let charts = {};

function hTab(t){
  document.querySelectorAll('[id^="hi-"]').forEach(e=>e.classList.remove('act'));
  document.getElementById('hi-'+t)?.classList.add('act');
  if(t==='overview') renderOverview();
  else if(t==='esg') renderESG();
  else if(t==='shops') renderShops();
  else if(t==='orders') renderOrders();
  else if(t==='partners') renderPartners();
  else if(t==='merchants') renderMerchants();
}

function periodSel(){
  return `<div class="frow">
    <select class="fsel" onchange="hPeriod=this.value;hTab(document.querySelector('[id^=hi-].act')?.id.replace('hi-',''))">
      ${['today','week','month','year','all'].map(o=>`<option value="${o}"${o===hPeriod?' selected':''}>${o.charAt(0).toUpperCase()+o.slice(1)}</option>`).join('')}
    </select>
    <select class="fsel" onchange="hShopFilter=this.value;hTab(document.querySelector('[id^=hi-].act')?.id.replace('hi-',''))">
      <option value="All">All Shops</option>
      ${SHOPS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
    </select>
    <button class="btn btn-p btn-sm" onclick="downloadCSV()">⬇ CSV</button>
    <button class="btn btn-o btn-sm" onclick="printESG()">🖨 PDF Report</button>
  </div>`;
}

function getFiltered(){
  let data = hShopFilter==='All' ? orders : orders.filter(o=>o.shopId===hShopFilter);
  return filterByPeriod(data, hPeriod);
}

function renderOverview(){
  const f=getFiltered(); const imp=calcImpact(f);
  const totalRev=orders.filter(o=>o.status==='completed').reduce((a,o)=>a+o.price,0);
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>Network Overview 🏢</h2><p>KainToGo — All shops, all data.</p></div>
    ${periodSel()}
    <div class="sgrid">
      <div class="scard"><div class="slbl">Network Revenue</div><div class="sval">₱${imp.revenue.toLocaleString()}</div><div class="schg">from ${imp.bagsSold} bags</div></div>
      <div class="scard"><div class="slbl">Total Orders</div><div class="sval">${f.length}</div></div>
      <div class="scard"><div class="slbl">Active Shops</div><div class="sval">${SHOPS.length}</div></div>
      <div class="scard"><div class="slbl">Active Partners</div><div class="sval">${partners.filter(p=>p.status==='active').length}</div></div>
    </div>
    <div class="igrid">
      <div class="icard"><div class="ico2">🥗</div><div class="ilbl">Food Rescued</div><div class="ival">${imp.kgSaved}</div><div class="iunit">kg</div></div>
      <div class="icard"><div class="ico2">🌫️</div><div class="ilbl">CO₂ Prevented</div><div class="ival">${imp.co2}</div><div class="iunit">kg</div></div>
      <div class="icard"><div class="ico2">💧</div><div class="ilbl">Water Saved</div><div class="ival">${imp.water}</div><div class="iunit">L</div></div>
      <div class="icard"><div class="ico2">🏔️</div><div class="ilbl">Landfill Spared</div><div class="ival">${imp.landfill}</div><div class="iunit">m³</div></div>
    </div>
    <div class="chart-row">
      <div class="chart-card"><h3>Food Rescued vs Waste</h3><div class="chart-wrap"><canvas id="hPie"></canvas></div></div>
      <div class="chart-card"><h3>Monthly Network Bags</h3><div class="chart-wrap"><canvas id="hBar"></canvas></div></div>
    </div>
    <div class="chart-card" style="margin-bottom:1.5rem"><h3>Revenue by Shop</h3><div class="chart-wrap"><canvas id="hShop"></canvas></div></div>`;
  setTimeout(()=>{
    const est=orders.length*IMPACT.kgPerBag;
    drawChart('pie','hPie',imp.kgSaved,Math.max(0,+(est-imp.kgSaved).toFixed(2)));
    drawChart('bar','hBar',f);
    drawChart('shop','hShop',f);
  },50);
}

function renderESG(){
  const f=getFiltered(); const imp=calcImpact(f);
  const breakdown=SHOPS.map(s=>{const si=calcImpact(filterByPeriod(orders,hPeriod,s.id));const estLoss=Math.max(0,orders.filter(o=>o.shopId===s.id).length*350-si.revenue);return{shop:s,imp:si,estLoss};});
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>🌿 ESG Analytics</h2><p>Environmental, Social & Governance data</p></div>
    ${periodSel()}
    <div class="igrid">
      <div class="icard"><div class="ico2">🥗</div><div class="ilbl">Food Rescued</div><div class="ival">${imp.kgSaved}</div><div class="iunit">kg</div></div>
      <div class="icard"><div class="ico2">🌫️</div><div class="ilbl">CO₂ Prevented</div><div class="ival">${imp.co2}</div><div class="iunit">kg</div></div>
      <div class="icard"><div class="ico2">💧</div><div class="ilbl">Water Saved</div><div class="ival">${imp.water}</div><div class="iunit">L</div></div>
      <div class="icard"><div class="ico2">💸</div><div class="ilbl">Revenue Recovered</div><div class="ival">₱${imp.revenue.toLocaleString()}</div></div>
    </div>
    <div class="tcard">
      <div class="thead2"><h3>Shop ESG Breakdown</h3></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Shop</th><th>Location</th><th>Bags Sold</th><th>Food (kg)</th><th>CO₂ (kg)</th><th>Water (L)</th><th>Revenue</th><th>Est. Cost Lost</th></tr></thead>
        <tbody>${breakdown.map(s=>`
          <tr><td><strong>${s.shop.name}</strong></td><td>${s.shop.location}</td>
          <td>${s.imp.bagsSold}</td>
          <td style="font-weight:700;color:var(--g)">${s.imp.kgSaved}</td>
          <td>${s.imp.co2}</td><td>${s.imp.water}</td>
          <td style="font-weight:700">₱${s.imp.revenue.toLocaleString()}</td>
          <td style="color:var(--red);font-weight:700">₱${s.estLoss.toLocaleString()}</td></tr>`).join('')}
          <tr style="background:var(--g);color:white"><td colspan="2"><strong>NETWORK TOTAL</strong></td>
          <td><strong>${imp.bagsSold}</strong></td>
          <td><strong>${imp.kgSaved} kg</strong></td>
          <td><strong>${imp.co2} kg</strong></td>
          <td><strong>${imp.water} L</strong></td>
          <td><strong>₱${imp.revenue.toLocaleString()}</strong></td>
          <td>—</td></tr>
        </tbody>
      </table></div>
    </div>
    <div style="background:var(--gl);border-radius:var(--r);padding:.875rem;font-size:11px;color:var(--gray)">
      <strong style="color:var(--g)">Conversion factors (kaintogo-shared.js):</strong>
      1 kg food = ${IMPACT.co2PerKg}kg CO₂ · ${IMPACT.waterPerKg}L water · ${IMPACT.landfillPerKg}m³ landfill (UN FAO/WRAP)
    </div>`;
}

function renderShops(){
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>🏪 All Shops</h2></div>
    ${periodSel()}
    <div class="tcard"><div style="overflow-x:auto"><table>
      <thead><tr><th>Shop</th><th>Location</th><th>Cuisine</th><th>Bags Sold</th><th>Food Rescued</th><th>Revenue</th><th>Status</th></tr></thead>
      <tbody>${SHOPS.map(s=>{const si=calcImpact(filterByPeriod(orders,hPeriod,s.id));return`
        <tr><td><strong>${s.name}</strong></td><td>${s.location}</td><td>${s.cuisine}</td>
        <td>${si.bagsSold}</td><td style="font-weight:700;color:var(--g)">${si.kgSaved} kg</td>
        <td style="font-weight:700">₱${si.revenue.toLocaleString()}</td>
        <td><span class="badge b-green">Active</span></td></tr>`;}).join('')}
      </tbody></table></div></div>`;
}

function renderOrders(){
  const f=getFiltered().slice().reverse();
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>📦 All Reservations</h2></div>
    ${periodSel()}
    <div class="tcard"><div style="overflow-x:auto"><table>

// ── PARTNERS ──
function sendPartnerRequest(){
  const name=document.getElementById('pname').value.trim();
  if(!name){toast('Please enter an organisation name.','e');return;}
  const newP={id:'p'+Date.now(),name,type:document.getElementById('ptype').value,
    contact:document.getElementById('pemail').value,area:document.getElementById('parea').value,
    status:'pending',partneredShops:[]};
  partners.push(newP);kSave('partners',partners);
  closeMod('partnerModal');renderPartners();
  toast('Partnership request sent to '+name+'! They will be notified.','s');
}

function acceptPartner(id){
  const p=partners.find(x=>x.id===id);if(p)p.status='active';kSave('partners',partners);renderPartners();
  toast('Partnership activated! Contract generated.','s');
}
function declinePartner(id){
  const p=partners.find(x=>x.id===id);if(p)p.status='declined';kSave('partners',partners);renderPartners();
}

function viewContract(id){
  const p=partners.find(x=>x.id===id);if(!p)return;

  openMod('contractModal');
}

  <tr><td>Landfill Preserved</td><td><strong>${imp.landfill} m³</strong></td></tr>
  <tr><td>Revenue Recovered</td><td><strong style="color:#1B4D3E">₱${imp.revenue.toLocaleString()}</strong></td></tr></table>
  <h2 style="color:#1B4D3E;font-size:16px;margin-top:1.5rem">Shop Breakdown</h2>
  <table><tr><th>Shop</th><th>Location</th><th>Bags</th><th>Food (kg)</th><th>CO₂ (kg)</th><th>Water (L)</th><th>Revenue</th></tr>
  ${bd.map(s=>`<tr><td>${s.shop.name}</td><td>${s.shop.location}</td><td>${s.imp.bagsSold}</td><td>${s.imp.kgSaved}</td><td>${s.imp.co2}</td><td>${s.imp.water}</td><td>₱${s.imp.revenue.toLocaleString()}</td></tr>`).join('')}
  <tr class="total"><td colspan="2"><strong>NETWORK TOTAL</strong></td><td><strong>${imp.bagsSold}</strong></td><td><strong>${imp.kgSaved}</strong></td><td><strong>${imp.co2}</strong></td><td><strong>${imp.water}</strong></td><td><strong>₱${imp.revenue.toLocaleString()}</strong></td></tr></table>
  <p style="font-size:10px;color:#6c757d;margin-top:2rem">Factors: 1kg food = ${IMPACT.co2PerKg}kg CO₂ · ${IMPACT.waterPerKg}L water (UN FAO/WRAP) · RA 2196 reference · www.kaintogo.com</p>
  </body></html>`);
  w.document.close();w.print();
}

// ── CHARTS ──
function drawChart(type,id,a,b){
  const ctx=document.getElementById(id);if(!ctx)return;
  if(charts[id])charts[id].destroy();
  if(type==='pie'){
    charts[id]=new Chart(ctx,{type:'doughnut',data:{labels:['Food Rescued (kg)','Estimated Waste (kg)'],datasets:[{data:[a,b],backgroundColor:['#1B4D3E','#dee2e6'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Montserrat',size:10}}}}}});
  } else if(type==='bar'){
    const months={};for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months[d.toLocaleString('default',{month:'short'})]=0;}
    (Array.isArray(a)?a:[]).filter(r=>r.status==='completed'||r.status==='confirmed').forEach(r=>{const k=new Date(r.date).toLocaleString('default',{month:'short'});if(months[k]!==undefined)months[k]++;});
    charts[id]=new Chart(ctx,{type:'bar',data:{labels:Object.keys(months),datasets:[{label:'Bags',data:Object.values(months),backgroundColor:'#1B4D3E',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  } else if(type==='shop'){
    const data=SHOPS.map(s=>({name:s.name,rev:calcImpact((Array.isArray(a)?a:[]).filter(o=>o.shopId===s.id)).revenue}));
    charts[id]=new Chart(ctx,{type:'bar',data:{labels:data.map(d=>d.name),datasets:[{label:'Revenue',data:data.map(d=>d.rev),backgroundColor:['#1B4D3E','#2d6b58','#E5F5E8','#e8a020','#6c757d'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  }
}
