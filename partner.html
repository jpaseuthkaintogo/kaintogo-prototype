<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KainToGo — Partner Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="kaintogo-shared.js"></script>
<style id="sharedStyle">
:root{
  --g:#1B4D3E;--gl:#E5F5E8;--gm:#2d6b58;--gd:#133829;
  --w:#FFFFFF;--dark:#212529;--gray:#6c757d;--lgray:#f8f9fa;
  --bdr:#dee2e6;--amber:#e8a020;--amber-l:#fff8e6;--red:#dc3545;
  --r:8px;--rl:16px;
  --sh:0 2px 12px rgba(27,77,62,.10);--shl:0 8px 32px rgba(27,77,62,.15);
  --serif:'Cormorant Garamond',serif;--sans:'Montserrat',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--lgray);color:var(--dark)}
.hidden{display:none!important}
.btn{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.8px;padding:9px 22px;border-radius:var(--r);border:1.5px solid var(--g);cursor:pointer;transition:all .2s;text-transform:uppercase;display:inline-block}
.btn-p{background:var(--g);color:var(--w)}.btn-p:hover{background:var(--gd)}
.btn-o{background:transparent;color:var(--g)}.btn-o:hover{background:var(--gl)}
.btn-sm{padding:6px 14px;font-size:10px}
.btn-amber{background:var(--amber);color:var(--w);border-color:var(--amber)}
.btn-danger{border-color:var(--red);color:var(--red);background:transparent}.btn-danger:hover{background:#fff5f5}
.btn-w{background:white;color:var(--g);border-color:white}.btn-w:hover{background:var(--gl)}
.btn-ghost{border-color:rgba(255,255,255,.5);color:white;background:transparent}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--dark);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--sans);font-size:13px;color:var(--dark);transition:border-color .2s;background:var(--w)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--g)}
.fg textarea{resize:vertical;min-height:80px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--g);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.b-green{background:var(--gl);color:var(--g)}.b-amber{background:#fff3cd;color:#856404}
.b-blue{background:#cff4fc;color:#055160}.b-red{background:#f8d7da;color:#842029}
.b-gray{background:#e9ecef;color:#495057}
.card{background:var(--w);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden}
.scard{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh)}
.slbl{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:.8px;text-transform:uppercase;margin-bottom:.4rem}
.sval{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--g);line-height:1}
.schg{font-size:10px;color:#28a745;margin-top:5px;font-weight:600}
.icard{background:var(--g);border-radius:var(--rl);padding:1.25rem;color:white;box-shadow:var(--sh)}
.icard .ico2{font-size:26px;margin-bottom:.5rem}
.icard .ilbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:4px}
.icard .ival{font-family:var(--serif);font-size:30px;font-weight:600}
.icard .iunit{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.tcard{background:var(--w);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden;margin-bottom:1.5rem}
.thead2{padding:1rem 1.25rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.thead2 h3{font-family:var(--serif);font-size:17px}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray);padding:9px 14px;text-align:left;background:var(--lgray);border-bottom:1px solid var(--bdr)}
tbody tr{border-bottom:1px solid var(--bdr);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--gl)}
tbody td{padding:11px 14px;font-size:12px}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.moverlay.open{display:flex}
.modal{background:var(--w);border-radius:var(--rl);padding:2rem;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;position:relative}
.modal h3{font-family:var(--serif);font-size:22px;color:var(--g);margin-bottom:1.25rem}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem}
.close-x{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray)}
.tabs{display:flex;border-bottom:2px solid var(--bdr);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:10px 18px;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;text-transform:uppercase;white-space:nowrap}
.tab.act{color:var(--g);border-bottom-color:var(--g)}
.dash{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 64px)}
.dside{background:var(--w);border-right:1px solid var(--bdr);padding:1rem 0}
.ditem{display:flex;align-items:center;gap:10px;padding:10px 1.25rem;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.ditem:hover,.ditem.act{color:var(--g);background:var(--gl);border-left-color:var(--g)}
.ditem .ico{font-size:15px;width:20px;text-align:center}
.dcon{padding:1.5rem;background:var(--lgray);overflow-y:auto}
.dhead{margin-bottom:1.5rem}
.dhead h2{font-family:var(--serif);font-size:26px}
.dhead p{font-size:12px;color:var(--gray);margin-top:3px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
.igrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.chart-card{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh)}
.chart-card h3{font-family:var(--serif);font-size:16px;margin-bottom:1rem}
.chart-wrap{position:relative;height:200px}
.frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem}
.fsel{padding:7px 12px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--sans);font-size:11px;font-weight:600;color:var(--dark);background:var(--w);cursor:pointer}
.fsel:focus{outline:none;border-color:var(--g)}
.search-in{padding:8px 14px;border:1.5px solid var(--bdr);border-radius:var(--r);font-family:var(--sans);font-size:12px;color:var(--dark);background:var(--w)}
.search-in:focus{outline:none;border-color:var(--g)}
.toast-con{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--dark);color:white;padding:11px 18px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:var(--shl);animation:tin .3s ease;max-width:320px}
.toast.s{background:var(--g)}.toast.e{background:var(--red)}
@keyframes tin{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
nav{background:var(--w);border-bottom:1px solid var(--bdr);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo img{height:36px;object-fit:contain}
.logo-text{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--g);letter-spacing:2px}
.ham{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:var(--dark)}
.err{background:#fff5f5;border:1px solid #f5c6c6;color:var(--red);border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:1rem}
@media(max-width:900px){.dash{grid-template-columns:1fr}.dside{display:none}.ham{display:block}}
@media(max-width:600px){.chart-row{grid-template-columns:1fr}.sgrid{grid-template-columns:1fr 1fr}.igrid{grid-template-columns:1fr 1fr}}
</style>
<style>
body{min-height:100vh}
.nav-r{display:flex;align-items:center;gap:8px}
.surplus-card{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh);margin-bottom:1rem;border-left:4px solid var(--g)}
.surplus-card h4{font-family:var(--serif);font-size:17px;margin-bottom:.25rem}
.surplus-card .meta{font-size:11px;color:var(--gray);line-height:1.7;margin-bottom:.75rem}
.req-card{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh);margin-bottom:1rem;border-left:4px solid var(--amber)}
.req-card h4{font-family:var(--serif);font-size:17px;margin-bottom:.25rem}
.pickup-card{background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh);margin-bottom:1rem}
.org-form{background:var(--w);border-radius:var(--rl);padding:1.5rem;box-shadow:var(--sh)}
.contract-box{background:var(--lgray);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;font-size:11px;line-height:1.9;max-height:320px;overflow-y:auto;white-space:pre-wrap;font-family:Georgia,serif;color:var(--dark)}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="window.location.href='index.html'">
    <img src="V3_light_BG.png" alt="KainToGo" onerror="this.style.display='none'"/>
    <span class="logo-text">KAINTOGO</span>
  </div>
  <div class="nav-r">
    <span style="font-size:11px;font-weight:600;color:var(--g)" id="navOrgName"></span>
    <div class="avatar" id="navAv">P</div>
    <button class="btn btn-o btn-sm" onclick="logout()">Out</button>
  </div>
</nav>

<div class="dash">
  <div class="dside">
    <div style="padding:.875rem 1.25rem;border-bottom:1px solid var(--bdr);margin-bottom:.75rem">
      <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--gray);text-transform:uppercase">Partner Portal</div>
    </div>
    <div class="ditem act" id="pi-overview" onclick="pTab('overview')"><span class="ico">📊</span>Overview</div>
    <div class="ditem" id="pi-marketplace" onclick="pTab('marketplace')"><span class="ico">🏪</span>Surplus Marketplace</div>
    <div class="ditem" id="pi-partnerships" onclick="pTab('partnerships')"><span class="ico">🤝</span>My Partnerships</div>
    <div class="ditem" id="pi-requests" onclick="pTab('requests')"><span class="ico">📩</span>Pending Requests <span id="reqBadge" style="background:var(--amber);color:white;border-radius:10px;padding:1px 7px;font-size:9px;font-weight:700;margin-left:4px"></span></div>
    <div class="ditem" id="pi-pickups" onclick="pTab('pickups')"><span class="ico">🚐</span>My Pickups</div>
    <div class="ditem" id="pi-org" onclick="pTab('org')"><span class="ico">🏢</span>Our Organisation</div>
  </div>
  <div class="dcon" id="dcon"></div>
</div>

<!-- CONTRACT VIEW MODAL -->
<div class="moverlay" id="contractModal">
  <div class="modal" style="max-width:640px">
    <button class="close-x" onclick="closeMod('contractModal')">✕</button>
    <h3>Partnership Contract</h3>
    <div class="contract-box" id="contractText"></div>
    <div class="mfoot">
      <button class="btn btn-o" onclick="closeMod('contractModal')">Close</button>
      <button class="btn btn-p" onclick="downloadContract()">⬇ Download Contract</button>
    </div>
  </div>
</div>

<!-- CLAIM SURPLUS MODAL -->
<div class="moverlay" id="claimModal">
  <div class="modal">
    <button class="close-x" onclick="closeMod('claimModal')">✕</button>
    <h3>Claim Surplus</h3>
    <div id="claimBody"></div>
    <div class="mfoot">
      <button class="btn btn-o" onclick="closeMod('claimModal')">Cancel</button>
      <button class="btn btn-p" onclick="confirmClaim()">Confirm Claim</button>
    </div>
  </div>
</div>

<div class="toast-con" id="toastCon"></div>

<script>

// ── AUTH GUARD ──
let cu = getCurrentUser();
if(!cu || cu.role !== 'partner'){window.location.href = 'login.html'; throw 'Not authorized';}

document.getElementById('navAv').textContent = cu.avatar;
document.getElementById('navOrgName').textContent = cu.org || 'Partner';

let partners = kLoad('partners') || seedPartners();
let wasteLogs = kLoad('waste') || seedWasteLogs();
let pickups = kLoad('p_pickups') || [];
let pendingRequests = kLoad('p_requests') || [
  {id:'req1',shopId:'s3',shopName:'Spice Route',shopLoc:'Quezon City',type:'Edible surplus — Prepared meals',freq:'Daily',qty:'~3–5 kg',date:'2026-04-01',status:'pending'},
  {id:'req2',shopId:'s4',shopName:'Brew & Bake',shopLoc:'Pasig City',type:'Edible — Bakery items',freq:'Daily',qty:'~1–2 kg',date:'2026-04-02',status:'pending'},
];

// Surplus marketplace data (from waste logs + simulated)
let surplusItems = [
  {id:'sup1',shopId:'s1',shop:'Green Bowl',location:'BGC, Taguig',type:'Prepared meals',category:'Edible',qty:3.5,expiry:'Today',condition:'Sealed containers, fridge-cold',storage:'Fridge',time:'After 7:00 PM',status:'available'},
  {id:'sup2',shopId:'s2',shop:'La Petite Boulangerie',location:'Makati City',type:'Bakery items',category:'Edible',qty:2.0,expiry:'Today',condition:'Bagged, room temp',storage:'Room temp',time:'After 6:00 PM',status:'available'},
  {id:'sup3',shopId:'s5',shop:'Kusina ni Aling Rosa',location:'Mandaluyong',type:'Buffet leftovers',category:'Edible',qty:4.0,expiry:'Today',condition:'Hot-held, containers',storage:'Fridge',time:'After 8:00 PM',status:'available'},
  {id:'sup4',shopId:'s3',shop:'Spice Route',location:'Quezon City',type:'Fruits and vegetables',category:'Inedible (waste)',qty:1.5,expiry:'Today',condition:'Peelings, scraps',storage:'Room temp',time:'After 7:00 PM',status:'available'},
];

let currentClaimId = null;

function pTab(t){
  document.querySelectorAll('[id^="pi-"]').forEach(e=>e.classList.remove('act'));
  document.getElementById('pi-'+t)?.classList.add('act');
  const pending = pendingRequests.filter(r=>r.status==='pending');
  document.getElementById('reqBadge').textContent = pending.length || '';
  if(t==='overview') renderOverview();
  else if(t==='marketplace') renderMarketplace();
  else if(t==='partnerships') renderPartnerships();
  else if(t==='requests') renderRequests();
  else if(t==='pickups') renderPickups();
  else if(t==='org') renderOrg();
}

// ── OVERVIEW ──
function renderOverview(){
  const active = partners.filter(p=>p.status==='active');
  const myPickups = pickups.length;
  const kgCollected = pickups.reduce((a,p)=>a+(p.qty||0),0).toFixed(1);
  const pending = pendingRequests.filter(r=>r.status==='pending').length;
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>Welcome, ${cu.name} 👋</h2><p>${cu.org} — Partner Dashboard</p></div>
    <div class="sgrid">
      <div class="scard"><div class="slbl">Active Partnerships</div><div class="sval">${active.length}</div></div>
      <div class="scard"><div class="slbl">Total Pickups</div><div class="sval">${myPickups}</div></div>
      <div class="scard"><div class="slbl">Food Collected</div><div class="sval">${kgCollected}<span style="font-size:14px"> kg</span></div></div>
      <div class="scard"><div class="slbl">Pending Requests</div><div class="sval" style="color:var(--amber)">${pending}</div></div>
    </div>
    <div class="igrid">
      <div class="icard"><div class="ico2">🥗</div><div class="ilbl">Food Redistributed</div><div class="ival">${kgCollected}</div><div class="iunit">kg total</div></div>
      <div class="icard"><div class="ico2">🌫️</div><div class="ilbl">CO₂ Prevented</div><div class="ival">${+(kgCollected*IMPACT.co2PerKg).toFixed(1)}</div><div class="iunit">kg</div></div>
      <div class="icard"><div class="ico2">🤝</div><div class="ilbl">Partner Shops</div><div class="ival">${active.length}</div></div>
      <div class="icard"><div class="ico2">📩</div><div class="ilbl">Pending Requests</div><div class="ival" style="color:var(--amber)">${pending}</div></div>
    </div>
    ${pending > 0 ? `
    <div style="background:var(--amber-l);border:1px solid var(--amber);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem">
      <div style="font-weight:700;margin-bottom:.5rem">🔔 ${pending} Partnership Request${pending>1?'s':''} Pending</div>
      <p style="font-size:12px;color:var(--gray);margin-bottom:.75rem">Review and respond to partnership requests from restaurants.</p>
      <button class="btn btn-amber btn-sm" onclick="pTab('requests')">Review Requests →</button>
    </div>` : ''}
    <div style="background:var(--gl);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem">
      <div style="font-size:11px;font-weight:700;color:var(--g);margin-bottom:.5rem">🏪 Surplus Available Now</div>
      <p style="font-size:12px;color:var(--gray);margin-bottom:.75rem">${surplusItems.filter(s=>s.status==='available').length} surplus items are available in the marketplace right now.</p>
      <button class="btn btn-p btn-sm" onclick="pTab('marketplace')">Browse Surplus →</button>
    </div>`;
}

// ── SURPLUS MARKETPLACE ──
function renderMarketplace(){
  const available = surplusItems.filter(s=>s.status==='available');
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>🏪 Surplus Marketplace</h2>
      <p>Browse and claim food surplus available for pickup today. Aligned with <strong>RA 2196</strong> (Food Waste Management Act).</p>
    </div>
    <div class="frow" style="margin-bottom:1.25rem">
      <select class="fsel" id="mktFilter" onchange="filterMarketplace()">
        <option value="">All Types</option>
        <option>Prepared meals</option>
        <option>Bakery items</option>
        <option>Buffet leftovers</option>
        <option>Fruits and vegetables</option>
        <option>Ingredients / raw food</option>
      </select>
      <select class="fsel" id="mktCat" onchange="filterMarketplace()">
        <option value="">All Categories</option>
        <option>Edible</option>
        <option>Inedible (waste)</option>
      </select>
    </div>
    <div id="surplusList">
      ${renderSurplusCards(available)}
    </div>
    <div style="background:var(--gl);border-radius:var(--r);padding:1rem;font-size:11px;color:var(--gray);margin-top:1rem">
      <strong style="color:var(--g)">RA 2196 Notice:</strong> KainToGo acts as a facilitating platform for food redistribution. Partners who claim surplus take full responsibility for transport, storage, and safe distribution in compliance with applicable regulations.
    </div>`;
}

function renderSurplusCards(items){
  if(!items.length) return '<p style="color:var(--gray);text-align:center;padding:3rem">No surplus available right now. Check back at closing time!</p>';
  return items.map(s=>`
    <div class="surplus-card" style="border-left-color:${s.category==='Edible'?'var(--g)':'var(--amber)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem">
        <div>
          <h4>${s.type} — ${s.qty} kg</h4>
          <div class="meta">
            🏪 <strong>${s.shop}</strong> · 📍 ${s.location}<br/>
            📦 ${s.category} · 🌡 ${s.storage} · ${s.condition}<br/>
            ⏰ Available: ${s.time} · Expires: ${s.expiry}
          </div>
          <span class="badge ${s.category==='Edible'?'b-green':'b-amber'}">${s.category}</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:700;color:var(--g)">FREE</div>
          <div style="font-size:10px;color:var(--gray)">pickup only</div>
        </div>
      </div>
      <div style="margin-top:.75rem;display:flex;gap:8px">
        <button class="btn btn-p btn-sm" onclick="openClaim('${s.id}')">🛻 Claim This Surplus</button>
      </div>
    </div>`).join('');
}

function filterMarketplace(){
  const typeF = document.getElementById('mktFilter').value;
  const catF = document.getElementById('mktCat').value;
  let items = surplusItems.filter(s=>s.status==='available');
  if(typeF) items = items.filter(s=>s.type===typeF);
  if(catF) items = items.filter(s=>s.category===catF);
  document.getElementById('surplusList').innerHTML = renderSurplusCards(items);
}

function openClaim(id){
  const s = surplusItems.find(x=>x.id===id); if(!s) return;
  currentClaimId = id;
  document.getElementById('claimBody').innerHTML=`
    <div style="background:var(--gl);border-radius:var(--r);padding:1rem;margin-bottom:1rem">
      <div style="font-weight:700;font-size:13px;margin-bottom:.25rem">${s.type} — ${s.qty} kg</div>
      <div style="font-size:12px;color:var(--gray)">${s.shop} · ${s.location}</div>
      <div style="font-size:12px;color:var(--gray)">Available: ${s.time}</div>
    </div>
    <div class="fg"><label>Estimated Pickup Time</label>
      <select id="claimTime">
        <option>Within 30 minutes of availability</option>
        <option>1 hour after availability</option>
        <option>2 hours after availability</option>
      </select>
    </div>
    <div class="fg"><label>Notes to Merchant (optional)</label>
      <textarea id="claimNotes" placeholder="e.g. Will arrive with refrigerated van..."></textarea>
    </div>
    <p style="font-size:11px;color:var(--gray);line-height:1.7">By confirming, your organisation accepts responsibility for transportation and appropriate use of this surplus in accordance with RA 2196 and applicable food safety regulations.</p>`;
  openMod('claimModal');
}

function confirmClaim(){
  const s = surplusItems.find(x=>x.id===currentClaimId); if(!s) return;
  const time = document.getElementById('claimTime').value;
  s.status = 'claimed';
  const pickup = {
    id:'PU'+Date.now(), surplusId:s.id, shop:s.shop, location:s.location,
    type:s.type, category:s.category, qty:s.qty,
    pickupTime:time, date:today(), status:'scheduled',
    notes:document.getElementById('claimNotes').value,
  };
  pickups.push(pickup); kSave('p_pickups',pickups);
  closeMod('claimModal');
  toast(`Surplus claimed! Pickup scheduled at ${s.shop} — ${time}.`,'s');
  renderMarketplace();
}

// ── PARTNERSHIPS ──
function renderPartnerships(){
  const active = partners.filter(p=>p.status==='active');
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>🤝 My Partnerships</h2><p>All active partnerships with restaurants and shops.</p></div>
    ${active.length ? active.map(p=>`
      <div style="background:var(--w);border-radius:var(--rl);padding:1.25rem;box-shadow:var(--sh);margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem">
          <div>
            <h4 style="font-family:var(--serif);font-size:18px;margin-bottom:.25rem">${p.name}</h4>
            <div style="font-size:11px;color:var(--gray)">${p.type} · ${p.area}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="badge b-green">Active</span>
            <button class="btn btn-sm btn-o" onclick="viewContract('${p.id}')">📄 Download Contract</button>
          </div>
        </div>
        <div style="margin-top:.75rem;font-size:12px;color:var(--gray)">
          Partner shops: ${p.partneredShops.map(sid=>SHOPS.find(s=>s.id===sid)?.name||sid).join(', ')||'All network shops'}
        </div>
      </div>`).join('')
    : '<div style="text-align:center;padding:3rem;color:var(--gray)">No active partnerships yet. Check your pending requests!</div>'}`;
}

// ── PENDING REQUESTS ──
function renderRequests(){
  const pending = pendingRequests.filter(r=>r.status==='pending');
  const handled = pendingRequests.filter(r=>r.status!=='pending');
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>📩 Partnership Requests</h2><p>Review incoming requests from restaurants looking to partner with you.</p></div>
    ${pending.length ? `
      <div style="font-size:11px;font-weight:700;color:var(--g);letter-spacing:.8px;text-transform:uppercase;margin-bottom:.75rem">Pending (${pending.length})</div>
      ${pending.map(r=>`
        <div class="req-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">
            <div>
              <h4>${r.shopName} <span style="font-size:12px;font-weight:400;color:var(--gray)">requests partnership</span></h4>
              <div style="font-size:11px;color:var(--gray)">📍 ${r.shopLoc} · 📅 Received: ${r.date}</div>
            </div>
            <span class="badge b-amber">Pending Review</span>
          </div>
          <div style="background:var(--lgray);border-radius:var(--r);padding:.875rem;margin-bottom:.875rem;font-size:12px;line-height:1.7">
            <div><strong>Type of surplus:</strong> ${r.type}</div>
            <div><strong>Estimated frequency:</strong> ${r.freq}</div>
            <div><strong>Estimated quantity:</strong> ${r.qty}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-p btn-sm" onclick="acceptRequest('${r.id}')">✓ Accept Partnership</button>
            <button class="btn btn-danger btn-sm" onclick="declineRequest('${r.id}')">✗ Decline</button>
          </div>
        </div>`).join('')}
    ` : '<div style="background:var(--gl);border-radius:var(--rl);padding:1.5rem;text-align:center;margin-bottom:1rem;color:var(--g);font-weight:600">✅ No pending requests. You\'re all caught up!</div>'}
    ${handled.length ? `
      <div style="font-size:11px;font-weight:700;color:var(--gray);letter-spacing:.8px;text-transform:uppercase;margin-bottom:.75rem;margin-top:1.5rem">Past Requests</div>
      ${handled.map(r=>`
        <div style="background:var(--w);border-radius:var(--rl);padding:1rem;box-shadow:var(--sh);margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:600;font-size:13px">${r.shopName}</div>
            <div style="font-size:11px;color:var(--gray)">${r.date} · ${r.type}</div>
          </div>
          <span class="badge ${r.status==='accepted'?'b-green':'b-red'}">${r.status}</span>
        </div>`).join('')}
    ` : ''}`;
}

function acceptRequest(id){
  const r = pendingRequests.find(x=>x.id===id); if(!r) return;
  r.status = 'accepted';
  kSave('p_requests', pendingRequests);
  // Auto-generate a contract
  toast('Partnership accepted! Contract has been generated and is now available to download.','s');
  renderRequests();
  document.getElementById('reqBadge').textContent = pendingRequests.filter(r=>r.status==='pending').length || '';
}

function declineRequest(id){
  const r = pendingRequests.find(x=>x.id===id); if(!r) return;
  r.status = 'declined';
  kSave('p_requests', pendingRequests);
  toast('Request declined.');
  renderRequests();
  document.getElementById('reqBadge').textContent = pendingRequests.filter(r=>r.status==='pending').length || '';
}

// ── PICKUPS ──
function renderPickups(){
  document.getElementById('dcon').innerHTML=`
    <div class="dhead"><h2>🚐 My Pickups</h2><p>Scheduled and completed surplus pickups.</p></div>
    ${pickups.length ? `
      <div class="tcard"><div style="overflow-x:auto"><table>
        <thead><tr><th>Date</th><th>Shop</th><th>Location</th><th>Type</th><th>Category</th><th>Qty (kg)</th><th>Pickup Time</th><th>Status</th><th></th></tr></thead>
        <tbody>${pickups.slice().reverse().map(p=>`
          <tr>
            <td>${p.date}</td>
            <td><strong>${p.shop}</strong></td>
            <td>${p.location}</td>
            <td>${p.type}</td>
            <td><span class="badge ${p.category==='Edible'?'b-green':'b-amber'}">${p.category}</span></td>
            <td style="font-weight:700;color:var(--g)">${p.qty} kg</td>
            <td>${p.pickupTime}</td>
            <td><span class="badge ${p.status==='completed'?'b-green':p.status==='scheduled'?'b-blue':'b-gray'}">${p.status}</span></td>
            <td>${p.status==='scheduled'?`<button class="btn btn-sm btn-p" onclick="completePickup('${p.id}')">Mark Collected</button>`:'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table></div></div>
    ` : '<div style="text-align:center;padding:3rem;color:var(--gray)">No pickups yet. Browse the marketplace to claim surplus!</div>'}
    <div class="igrid" style="margin-top:1.25rem">
      <div class="icard"><div class="ico2">🚐</div><div class="ilbl">Total Pickups</div><div class="ival">${pickups.length}</div></div>
      <div class="icard"><div class="ico2">🥗</div><div class="ilbl">Food Collected</div><div class="ival">${pickups.reduce((a,p)=>a+(p.qty||0),0).toFixed(1)}</div><div class="iunit">kg</div></div>
    </div>`;
}

function completePickup(id){
  const p = pickups.find(x=>x.id===id); if(!p) return;
  p.status = 'completed'; kSave('p_pickups',pickups);
  toast('Pickup marked as collected! Thank you for rescuing food. 🌿','s');
  renderPickups();
}

    <div class="dhead"><h2>🏢 Our Organisation</h2></div>
    <div class="org-form">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">

function saveOrg(){

  cu.email = document.getElementById('orgEmail').value;
  cu.phone = document.getElementById('orgPhone').value;
  cu.area = document.getElementById('orgArea').value;
  cu.surplusTypes = document.getElementById('orgSurplus').value;
  cu.capacity = document.getElementById('orgCap').value;
  cu.accreditation = document.getElementById('orgAcc').value;
  setCurrentUser(cu);
  document.getElementById('navOrgName').textContent = cu.org;

  const p = partners.find(x=>x.id===partnerId);
  const contractText = p ? generateContractText(p) : 'Contract not found.';
  document.getElementById('contractText').textContent = contractText;
  openMod('contractModal');
}

function downloadContract(){
  const text = document.getElementById('contractText').textContent;
  const blob = new Blob([text],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kaintogo-partnership-contract-'+today()+'.txt';
  a.click();
  toast('Contract downloaded! 📄','s');
}

pTab('overview');
</script>
